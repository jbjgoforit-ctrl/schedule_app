name: schedule_app
description: 通用课表APP - 支持多学校教务系统导入

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  dio: ^5.7.0
  html: ^0.15.4

  go_router: ^14.2.0
  shared_preferences: ^2.3.0
  uuid: ^4.5.0
  intl: ^0.19.0
