  cupertino_icons: ^1.0.8
  json_annotation: ^4.9.0
  share_plus: ^12.0.2
  webview_flutter: ^4.10.0
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
